name: Generate GitHub Trophies

on:
  schedule:
    - cron: "0 0 * * *"  # runs daily at midnight UTC
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate trophy image
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: pritu761
          output_path: trophy.svg
          theme: tokyonight
          no-frame: true
          no-bg: true
          margin-w: 4
          column: 7
          token: ${{ secrets.TROPHY_TOKEN }}

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update trophy image"
          file_pattern: trophy.svg
